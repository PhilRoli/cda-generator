server.port=8080
server.error.include-message=never

# Set automatically by Maven resource filtering from pom.xml — do not override manually.
app.version=@project.version@

app.db-path=${APP_DB_PATH:data/cda-uebung.db}
app.elga-lib-dir=${APP_ELGA_LIB_DIR:elga-lib}
app.elga-wrapper-dir=${APP_ELGA_WRAPPER_DIR:scripts/cda2pdf-uebung}
app.elga-stylesheet-path=${APP_ELGA_STYLESHEET_PATH:assets/ELGA_Stylesheet_v1.0.xsl}
app.watermark-text=${APP_WATERMARK_TEXT:ÜBUNGSDOKUMENT}
app.watermark-opacity=${APP_WATERMARK_OPACITY:0.17}
app.admin-token=${APP_ADMIN_TOKEN:}
app.clean-pdf-password=${APP_CLEAN_PDF_PASSWORD:}

# PDF generation bounds (DoS protection for the unauthenticated, strictly-serial converter).
app.pdf.max-concurrent=${APP_PDF_MAX_CONCURRENT:1}
app.pdf.acquire-timeout-seconds=${APP_PDF_ACQUIRE_TIMEOUT_SECONDS:5}
app.pdf.conversion-timeout-seconds=${APP_PDF_CONVERSION_TIMEOUT_SECONDS:60}
app.pdf.max-xml-bytes=${APP_PDF_MAX_XML_BYTES:5242880}

# Upload size caps for /api/pdf/upload (GlobalExceptionHandler maps the overflow to 413).
spring.servlet.multipart.max-file-size=${APP_PDF_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${APP_PDF_MAX_REQUEST_SIZE:5MB}

# Automatic scenario backup.
app.backup.dir=${APP_BACKUP_DIR:data/backups}
app.backup.interval-ms=${APP_BACKUP_INTERVAL_MS:86400000}
app.backup.retention=${APP_BACKUP_RETENTION:14}
